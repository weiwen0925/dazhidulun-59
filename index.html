<style>

  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;

}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);

  -webkit-touch-callout:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
*{box-sizing:border-box;}
img{-webkit-user-drag:none;pointer-events:none;}

/* 漢堡 */
#sbToggle{display:none;position:fixed;top:16px;left:16px;width:42px;height:42px;
  background:var(--sbBg);color:var(--gold);border:0;border-radius:8px;
  font-size:20px;cursor:pointer;z-index:200;}

/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;}
.sb-item{display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:6px 4px;width:64px;border-radius:8px;
  text-decoration:none;color:var(--sbText);transition:all .25s;}
.sb-item:hover{background:rgba(184,134,11,.15);color:var(--gold);}
.sb-item.active{background:rgba(184,134,11,.3);color:var(--gold);
  box-shadow:0 0 12px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  background:rgba(184,134,11,.2);color:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:14px;
  border:1px solid rgba(184,134,11,.4);}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;}
.sb-label{font-size:10.5px;letter-spacing:1px;text-align:center;}

/* 主內容 */
.main{margin-left:var(--sbW);padding:0;min-height:100vh;}

/* Hero */
.site-hero{position:relative;padding:80px 30px 70px;
  background:linear-gradient(135deg,#1e1a14 0%,#2d2418 50%,#1e1a14 100%);
  color:#fff;text-align:center;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:380px;color:rgba(212,168,75,.04);
  font-weight:900;letter-spacing:30px;pointer-events:none;}
.hero-meta{position:relative;z-index:1;color:var(--goldL);font-size:14px;
  letter-spacing:6px;margin-bottom:8px;font-family:"Noto Sans TC",sans-serif;}
.hero-title{position:relative;z-index:1;font-size:52px;font-weight:900;
  color:#fff;margin:6px 0 6px;letter-spacing:8px;line-height:1.2;}
.hero-subtitle{position:relative;z-index:1;color:var(--gold);font-size:20px;
  letter-spacing:4px;font-weight:600;margin-bottom:6px;}
.hero-sub{position:relative;z-index:1;color:rgba(255,255,255,.78);font-size:16px;
  letter-spacing:2px;margin-bottom:12px;line-height:1.6;}
.hero-range{position:relative;z-index:1;color:var(--goldL);font-size:14px;
  letter-spacing:5px;margin-top:14px;padding:8px 0;
  border-top:1px solid rgba(212,168,75,.3);border-bottom:1px solid rgba(212,168,75,.3);
  display:inline-block;padding-left:36px;padding-right:36px;}

/* Preface */
.preface{max-width:980px;margin:46px auto 30px;padding:0 30px;}
.preface h2{text-align:center;font-size:26px;color:var(--accent);
  letter-spacing:6px;margin-bottom:24px;font-weight:700;}
.preface p{color:var(--text2);font-size:16px;line-height:2;margin:0 0 14px;
  text-align:justify;text-indent:2em;}

/* TOC */
.toc-section{max-width:1100px;margin:36px auto;padding:0 30px 50px;}
.toc-title{text-align:center;font-size:30px;color:var(--accent);
  letter-spacing:8px;font-weight:700;margin:0 0 8px;}
.toc-desc{text-align:center;color:var(--text-muted);font-size:14px;
  letter-spacing:3px;margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;}
.toc-card{display:block;background:var(--card);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;
  padding:22px 24px;text-decoration:none;color:inherit;
  transition:all .3s;box-shadow:0 2px 10px rgba(91,58,41,.06);}
.toc-card:hover{transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(184,134,11,.18);border-left-color:var(--accent-red);}
.toc-num{display:inline-block;width:32px;height:32px;line-height:32px;
  background:var(--gold);color:#fff;border-radius:50%;text-align:center;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:15px;
  margin-bottom:8px;}
.toc-name{font-size:18px;color:var(--accent);font-weight:700;
  line-height:1.6;margin-bottom:6px;}
.toc-sub{font-size:13.5px;color:var(--text2);line-height:1.7;}

/* Chapter */
.chapter{max-width:1100px;margin:46px auto;padding:0 30px;
  scroll-margin-top:20px;}
.ch-head{background:var(--headGrad);color:#fff;
  padding:34px 30px;text-align:center;border-radius:12px 12px 0 0;
  border-bottom:3px solid var(--gold);position:relative;}
.ch-head::after{content:"";position:absolute;bottom:-3px;left:50%;
  transform:translateX(-50%);width:80px;height:3px;
  background:var(--gold-light);}
.ch-num{color:var(--goldL);font-size:15px;letter-spacing:6px;
  font-family:"Noto Sans TC",sans-serif;margin-bottom:6px;}
.ch-name{font-size:30px;font-weight:900;letter-spacing:5px;
  margin-bottom:6px;color:#fff;}
.ch-sub{color:rgba(255,255,255,.78);font-size:14.5px;letter-spacing:2px;
  font-family:"Noto Sans TC",sans-serif;margin-top:6px;}
.ch-body{background:#fffdf5;border:1px solid var(--border);border-top:0;
  border-radius:0 0 12px 12px;padding:36px 36px 30px;}

/* Bridge */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;
  background:var(--gold);color:#fff;
  padding:3px 12px;border-radius:12px;letter-spacing:2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2;font-size:15.5px;
  text-align:justify;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;
  background:#fffdf7;border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);
  margin:0 0 8px;min-height:180px;}

/* next-link */
.next-link{display:inline-block;margin:14px 0 0;color:var(--accent-red);
  font-weight:700;text-decoration:none;font-size:15px;
  padding:8px 18px;border:1px solid var(--accent-red);
  border-radius:20px;transition:all .2s;}
.next-link:hover{background:var(--accent-red);color:#fff;}

/* read-progress */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;
  transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* backTop */
#backTop{position:fixed;right:24px;bottom:60px;width:44px;height:44px;
  border-radius:50%;background:var(--gold);color:#fff;border:0;
  font-size:18px;cursor:pointer;z-index:130;display:none;
  box-shadow:0 4px 12px rgba(0,0,0,.2);}
#backTop:hover{background:var(--goldL);}

/* footer */
.site-footer{padding:40px 30px;text-align:center;color:var(--text-muted);
  font-size:14px;letter-spacing:2px;border-top:1px solid var(--border);
  margin-top:50px;background:#f0e8d8;}

/* 響應式 */
@media (max-width:900px){
  #sbToggle{display:block;}
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  .site-hero{padding:60px 20px 50px;}
  .hero-title{font-size:36px;letter-spacing:4px;}
  .toc-section,.chapter,.preface{padding:0 18px;}
  .ch-head{padding:24px 20px;}
  .ch-name{font-size:22px;letter-spacing:3px;}
  .ch-body{padding:22px 18px;}
}

<script>
/* ===== 漢堡選單 ===== */
var sb = document.getElementById('sb');
var sbToggle = document.getElementById('sbToggle');
if(sbToggle) sbToggle.addEventListener('click', function(){ sb.classList.toggle('open'); });

/* ===== 卷名點擊回頂 ===== */
var sbBrand = document.getElementById('sbBrand');
if(sbBrand){
  sbBrand.addEventListener('click', function(e){
    e.preventDefault();
    window.scrollTo({top:0,behavior:'smooth'});
  });
}

/* ===== 側欄高亮 ===== */
var sbItems = document.querySelectorAll('.sb-item');
function highlightSidebar(){
  var chapters = document.querySelectorAll('.chapter');
  var top = window.innerHeight * 0.35;
  var active = null;
  chapters.forEach(function(c){
    if(c.getBoundingClientRect().top < top) active = c;
  });
  if(active){
    var id = active.id;
    var n = id.replace('chapter-','');
    sbItems.forEach(function(it){
      if(it.dataset.ch === n) it.classList.add('active');
      else it.classList.remove('active');
    });
  }
}
window.addEventListener('scroll', highlightSidebar, {passive:true});

/* ===== 閱讀進度 ===== */
var rpFill = document.getElementById('rpFill');
var rpPct  = document.getElementById('rpPct');
function updateProgress(){
  var sh = document.documentElement.scrollHeight - window.innerHeight;
  var pct = sh > 0 ? Math.min(100, Math.max(0, window.scrollY / sh * 100)) : 0;
  if(rpFill) rpFill.style.width = pct + '%';
  if(rpPct)  rpPct.textContent  = Math.round(pct) + '%';
}
window.addEventListener('scroll', updateProgress, {passive:true});
updateProgress();

/* ===== 接近頁尾淡出進度膠囊 ===== */
(function(){
  var cap = document.getElementById('readProgress');
  if(!cap) return;
  function setHide(on){ cap.classList.toggle('hide-near-end', !!on); }
  var targets = [];
  var f1 = document.querySelector('[data-wy-notice="v2"]');
  if(f1) targets.push(f1);
  var f2 = document.querySelector('.site-footer');
  if(f2) targets.push(f2);
  if(!targets.length) return;
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      var any = entries.some(function(e){return e.isIntersecting;});
      setHide(any);
    }, {root:null, rootMargin:'0px 0px -20px 0px', threshold:0.01});
    targets.forEach(function(t){ io.observe(t); });
  } else {
    var check=function(){
      var dh=document.documentElement.scrollHeight;
      var sb=window.scrollY+window.innerHeight;
      setHide(dh - sb < 240);
    };
    window.addEventListener('scroll', check, {passive:true});
    check();
  }
})();

/* ===== iframe 自動高度 ===== */
function resizeFrame(f){
  try{
    var d = f.contentDocument || f.contentWindow.document;
    if(!d || !d.body) return;
    d.body.style.minHeight = '0';
    d.body.style.height = 'auto';
    if(d.documentElement){
      d.documentElement.style.minHeight = '0';
      d.documentElement.style.height = 'auto';
    }
    var h = d.body.scrollHeight;
    if(h > 100){
      f.style.height = h + 'px';
      f.style.minHeight = '0';
    }
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function') updateProgress();
}
function setupFrame(f){
  var tries = 0;
  function tick(){
    tries++;
    resizeFrame(f);
    if(tries < 30) setTimeout(tick, 200);
  }
  if(f.contentDocument && f.contentDocument.readyState === 'complete'){
    tick();
  } else {
    f.addEventListener('load', tick);
  }
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize', function(){
  clearTimeout(rzT);
  rzT = setTimeout(resizeAllFrames, 200);
});

/* ===== 錨點防錯跳 ===== */
document.addEventListener('click', function(e){
  var a = e.target;
  while(a && a.tagName !== 'A') a = a.parentElement;
  if(!a) return;
  var h = a.getAttribute('href');
  if(!h || h.charAt(0) !== '#' || h.length < 2) return;
  var id = h.substring(1);
  var el = document.getElementById(id);
  if(!el) return;
  e.preventDefault();
  resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect = el.getBoundingClientRect();
    var y = window.scrollY + rect.top - 20;
    window.scrollTo({top:y, behavior:'smooth'});
  }, 60);
}, true);

/* ===== 15 秒輪詢 ===== */
var _rt=0, _riv=setInterval(function(){
  _rt++; resizeAllFrames();
  if(_rt > 50) clearInterval(_riv);
}, 300);

/* ===== backTop ===== */
var backTop = document.getElementById('backTop');
window.addEventListener('scroll', function(){
  if(backTop) backTop.style.display = window.scrollY > 600 ? 'block' : 'none';
}, {passive:true});
if(backTop) backTop.addEventListener('click', function(){
  window.scrollTo({top:0, behavior:'smooth'});
});

/* ===== 防複製外層 ===== */
(function(){
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev, blk, true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
