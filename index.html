    try{var d=frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document);
      var t=d&&d.getElementById(hash);
      if(t){if(typeof resizeAllFrames==='function')resizeAllFrames();
        var fr=frame.getBoundingClientRect();var tr=t.getBoundingClientRect();
        window.scrollTo({top:window.scrollY+fr.top+tr.top-16,behavior:'smooth'});return;}
    }catch(e){}
    if(tries<60)setTimeout(tryScroll,300);})();
}
window.addEventListener('hashchange',function(){gotoAnchor(decodeURIComponent(location.hash.slice(1)));});
if(location.hash.length>1){var _gh=decodeURIComponent(location.hash.slice(1));
  var _gt=0,_giv=setInterval(function(){_gt++;gotoAnchor(_gh);if(_gt>4)clearInterval(_giv);},1400);}

// tooltip
var tip=document.getElementById('sbTip');
if(tip){var tn=tip.querySelector('.tt-name'),tt=tip.querySelector('.tt-tip');
items.forEach(function(it){it.addEventListener('mouseenter',function(){
if(window.innerWidth<=900)return;tn.textContent=it.getAttribute('data-name');
tt.textContent=it.getAttribute('data-tip');var r=it.getBoundingClientRect();
var y=Math.max(70,Math.min(window.innerHeight-70,r.top+r.height/2));
tip.style.left=(r.right+12)+'px';tip.style.top=y+'px';tip.classList.add('show');});
it.addEventListener('mouseleave',function(){tip.classList.remove('show');});});

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy59dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
